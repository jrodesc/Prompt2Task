<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1 class="auth-title">Iniciar Sesión</h1>
    <p class="auth-subtitle">Prompt2Task — Gestor de tareas técnicas</p>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" formControlName="email" placeholder="tu@email.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <input class="field-input" type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      @if (error) {
        <div class="auth-error">{{ error }}</div>
      }

      <button class="btn-submit" type="submit" [disabled]="loading || form.invalid">
        @if (loading) { <span>Cargando...</span> } @else { Entrar }
      </button>
    </form>

    <div class="auth-footer">
      ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
    </div>
  </div>
</div>
