<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">⚡</div>
    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-subtitle">Empieza a gestionar tus tareas técnicas</p>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="field-group">
        <label class="field-label">Nombre</label>
        <input class="field-input" formControlName="name" placeholder="Tu nombre" autocomplete="name" />
      </div>

      <div class="field-group">
        <label class="field-label">Email</label>
        <input class="field-input" type="email" formControlName="email" placeholder="tu@email.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <input class="field-input" type="password" formControlName="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
      </div>

      @if (error) {
        <div class="auth-error">{{ error }}</div>
      }

      <button class="btn-submit" type="submit" [disabled]="loading || form.invalid">
        @if (loading) { <span>Cargando...</span> } @else { Registrarse }
      </button>
    </form>

    <div class="auth-footer">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
    </div>
  </div>
</div>
