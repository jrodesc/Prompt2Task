<div class="form-page">
  <div class="form-container">

    <div class="form-header">
      <a class="back-link" routerLink="/dashboard">
        <span class="material-icons">arrow_back</span>
      </a>
      <h1 class="form-title">{{ isEdit ? 'Editar tarea' : 'Nueva tarea' }}</h1>
    </div>

    <div class="form-card">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field-group">
          <label class="field-label">Título *</label>
          <input class="field-input" formControlName="title" placeholder="Nombre de la tarea" />
          @if (form.get('title')?.invalid && form.get('title')?.touched) {
            <span class="field-error">El título es requerido (máx. 200 chars)</span>
          }
        </div>

        <div class="field-group">
          <label class="field-label">Descripción</label>
          <textarea class="field-textarea" formControlName="description" placeholder="Descripción detallada..." rows="5"></textarea>
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label class="field-label">Estado</label>
            <select class="field-select" formControlName="status">
              @for (s of statuses; track s) { <option [value]="s">{{ STATUS_LABELS[s] }}</option> }
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">Prioridad</label>
            <select class="field-select" formControlName="priority">
              @for (p of priorities; track p) { <option [value]="p">{{ PRIORITY_LABELS[p] }}</option> }
            </select>
          </div>
        </div>

        <div class="fields-row">
          <div class="field-group">
            <label class="field-label">Categoría</label>
            <select class="field-select" formControlName="category">
              @for (c of categories; track c) { <option [value]="c">{{ CATEGORY_LABELS[c] }}</option> }
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">Fecha límite</label>
            <mat-form-field appearance="outline" class="date-field">
              <input matInput [matDatepicker]="picker" formControlName="dueDate" />
              <mat-datepicker-toggle matIconSuffix [for]="picker" />
              <mat-datepicker #picker />
            </mat-form-field>
          </div>
        </div>

        <div class="form-actions">
          <a class="btn-ghost" routerLink="/dashboard">Cancelar</a>
          <button class="btn-primary" type="submit" [disabled]="loading || form.invalid">
            @if (loading) {
              <mat-spinner diameter="18" />
            } @else {
              {{ isEdit ? 'Guardar cambios' : 'Crear tarea' }}
            }
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
